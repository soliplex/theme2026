name: Flutter CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".markdownlint.json"
      - "LICENSE"
  pull_request:
    branches: [main, 'feat/**', 'fix/**', 'refactor/**', 'chore/**']
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".markdownlint.json"
      - "LICENSE"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Setup Dart environment
        uses: ./.github/actions/setup-dart-env

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze --fatal-infos

      - name: Lint markdown
        run: npx markdownlint-cli2 "**/*.md" "#node_modules"

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Setup Dart environment
        uses: ./.github/actions/setup-dart-env

      - name: Generate random seed
        id: seed
        run: echo "value=$RANDOM" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: |
          SEED="${{ steps.seed.outputs.value }}"
          echo "::notice::Test ordering seed: $SEED"
          flutter test --test-randomize-ordering-seed="$SEED"

      - name: Report seed on failure
        if: failure()
        run: |
          SEED="${{ steps.seed.outputs.value }}"
          echo "::error::Tests failed with ordering seed: $SEED"
          echo "Reproduce with: --test-randomize-ordering-seed=$SEED"

  build-web:
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Setup Dart environment
        uses: ./.github/actions/setup-dart-env

      - name: Build web
        run: flutter build web --release

      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: build/web/
          retention-days: 7
